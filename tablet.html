<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SketchBridge — Draw</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Theme: light ── */
    [data-theme="light"] {
      --bg:#f4f4f8; --bg-surface:#eaeaf0; --bg-card:#ffffff; --bg-input:#f0f0f5;
      --border:rgba(0,0,0,0.08); --border-hover:rgba(0,0,0,0.15);
      --text-primary:#0f0f1a; --text-secondary:#44446a; --text-muted:#9999bb;
    }
    [data-theme="light"] body { background:var(--bg); }
    [data-theme="light"] body::before { background-image:linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px); }
    [data-theme="light"] #draw-canvas { background:#f4f4f8; }
    [data-theme="light"] .t-topbar,
    [data-theme="light"] .t-toolbar,
    [data-theme="light"] #t-page-strip { background:rgba(244,244,248,0.92) !important; }

    html, body { overflow:hidden; overscroll-behavior:none; touch-action:none; height:100%; width:100%; }

    .tablet-shell { display:flex; flex-direction:column; height:100dvh; width:100vw; position:relative; z-index:1; }

    /* ── Topbar ── */
    .t-topbar {
      display:flex; align-items:center; justify-content:space-between;
      height:48px; padding:0 0.85rem;
      background:rgba(8,8,15,0.9); backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border); flex-shrink:0; z-index:50; gap:0.5rem;
    }
    .t-logo { font-family:var(--font-display); font-weight:800; font-size:0.9rem; letter-spacing:-0.03em; display:flex; align-items:center; gap:6px; }
    .logo-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; box-shadow:0 0 7px var(--accent); }
    .t-room-chip { font-family:var(--font-mono); font-size:0.75rem; letter-spacing:0.12em; color:var(--accent); background:var(--accent-dim); border:1px solid rgba(79,142,247,0.2); border-radius:var(--radius-sm); padding:3px 8px; }
    .t-conn-dot { width:7px; height:7px; border-radius:50%; background:#444; flex-shrink:0; transition:background 0.3s; }
    .t-conn-dot.live { background:#22c55e; box-shadow:0 0 6px #22c55e; }

    /* ── Canvas ── */
    .t-canvas-wrap { flex:1; position:relative; overflow:hidden; touch-action:none; }
    #draw-canvas { position:absolute; top:0; left:0; width:100%; height:100%; display:block; touch-action:none; cursor:crosshair; background:var(--bg); }
    .eraser-active #draw-canvas { cursor:cell; }
    .text-mode-active #draw-canvas { cursor:text; }

    /* ── Page strip ── */
    #t-page-strip {
      display:flex; align-items:center; gap:4px; padding:5px 8px;
      background:rgba(8,8,15,0.88); backdrop-filter:blur(10px);
      border-top:1px solid var(--border); overflow-x:auto; scrollbar-width:none; flex-shrink:0;
    }

    /* ── Active draw bar ── */
    .t-active-bar { height:2px; background:var(--accent); border-radius:1px; opacity:0; transition:opacity 0.15s; flex-shrink:0; }
    .t-active-bar.drawing { opacity:1; }

    /* ── Toolbar ── */
    .t-toolbar {
      background:rgba(8,8,15,0.92); backdrop-filter:blur(16px);
      border-top:1px solid var(--border);
      padding:0.6rem 0.75rem;
      padding-bottom:max(0.6rem, env(safe-area-inset-bottom));
      flex-shrink:0; z-index:50; display:flex; flex-direction:column; gap:0.55rem;
    }
    .t-tool-row { display:flex; align-items:center; gap:6px; }

    .t-btn {
      display:flex; align-items:center; justify-content:center;
      border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--bg-card); color:var(--text-secondary);
      cursor:pointer; transition:var(--transition); flex-shrink:0;
      -webkit-tap-highlight-color:transparent;
    }
    .t-btn:active { transform:scale(0.92); background:var(--bg-input); }
    .t-btn.active { background:var(--accent-dim); color:var(--accent); border-color:rgba(79,142,247,0.35); }
    .t-btn-sq    { width:38px; height:38px; }
    .t-btn-wide  { padding:0 12px; height:38px; font-size:0.78rem; font-family:var(--font-body); font-weight:500; gap:5px; }

    /* ── Colour swatches ── */
    .t-color-row { display:flex; align-items:center; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
    .t-color-row::-webkit-scrollbar { display:none; }
    .t-swatch { width:28px; height:28px; border-radius:50%; border:2px solid transparent; cursor:pointer; flex-shrink:0; transition:transform 0.15s,border-color 0.15s; -webkit-tap-highlight-color:transparent; }
    .t-swatch:active { transform:scale(0.88); }
    .t-swatch.selected { border-color:#fff; transform:scale(1.15); }
    .t-swatch-custom { width:28px; height:28px; border-radius:50%; border:2px dashed var(--border-hover); cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition:var(--transition); -webkit-tap-highlight-color:transparent; background:var(--bg-input); position:relative; overflow:hidden; }
    .t-swatch-custom input[type="color"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none; padding:0; }

    /* ── Brush size ── */
    .t-size-row { display:flex; align-items:center; gap:10px; }
    .t-size-label { font-family:var(--font-mono); font-size:0.68rem; color:var(--text-muted); min-width:14px; text-align:right; }
    .t-size-slider { flex:1; -webkit-appearance:none; appearance:none; height:4px; background:var(--bg-input); border-radius:2px; outline:none; border:1px solid var(--border); }
    .t-size-slider::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid #fff; cursor:pointer; box-shadow:0 0 8px var(--accent-glow); }
    .t-size-slider::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid #fff; cursor:pointer; }
    .brush-preview-wrap { width:36px; height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    #brush-preview { border-radius:50%; background:var(--text-primary); transition:width 0.1s,height 0.1s,background 0.1s; }

    /* ── Text input overlay ── */
    .text-input-overlay {
      position:absolute; display:none;
      background:transparent; border:none; outline:none;
      font-family:var(--font-body); color:var(--text-primary);
      padding:0; margin:0; min-width:120px; max-width:80vw;
      caret-color:var(--accent); z-index:30;
      border-bottom:1px dashed var(--accent);
    }
    .text-input-overlay.active { display:block; }

    /* ── Settings drawer ── */
    .settings-drawer {
      position:fixed; inset:0; z-index:150; display:none; align-items:flex-end;
    }
    .settings-drawer.open { display:flex; }
    .settings-backdrop { position:absolute; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); }
    .settings-sheet {
      position:relative; width:100%; background:var(--bg-card);
      border-top:1px solid var(--border-hover); border-radius:24px 24px 0 0;
      padding:1.5rem 1.25rem;
      padding-bottom:max(1.5rem, env(safe-area-inset-bottom));
      z-index:1; display:flex; flex-direction:column; gap:1rem;
    }
    .settings-handle { width:40px; height:4px; background:var(--border-hover); border-radius:2px; margin:0 auto 0.5rem; }
    .settings-title { font-family:var(--font-display); font-weight:700; font-size:1rem; }
    .settings-row { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .settings-label { font-size:0.875rem; color:var(--text-secondary); }

    /* ── Toggle switch ── */
    .toggle { position:relative; width:44px; height:24px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; position:absolute; }
    .toggle-track { position:absolute; inset:0; border-radius:12px; background:var(--bg-input); border:1px solid var(--border); cursor:pointer; transition:background 0.2s; }
    .toggle input:checked ~ .toggle-track { background:var(--accent); border-color:var(--accent); }
    .toggle-thumb { position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition:transform 0.2s; pointer-events:none; }
    .toggle input:checked ~ .toggle-track .toggle-thumb { transform:translateX(20px); }

    /* ── Connecting overlay ── */
    .t-connect-overlay { position:absolute; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; z-index:40; transition:opacity 0.35s; }
    .t-connect-overlay.hidden { opacity:0; pointer-events:none; }
    .t-connect-title { font-family:var(--font-display); font-size:1.1rem; font-weight:700; }
    .t-connect-sub { font-size:0.82rem; color:var(--text-secondary); }
  </style>
</head>
<body>
<div class="tablet-shell" id="tablet-shell">

  <!-- Topbar -->
  <div class="t-topbar">
    <div class="t-logo"><span class="logo-dot"></span>SketchBridge</div>
    <span class="t-room-chip" id="t-room-display">——</span>
    <div style="display:flex;align-items:center;gap:6px;margin-left:auto;">
      <span style="font-size:0.68rem;color:var(--text-muted);" id="t-status-text">Connecting…</span>
      <div class="t-conn-dot" id="t-conn-dot"></div>
    </div>
    <!-- Settings button -->
    <button class="t-btn t-btn-sq" id="btn-settings" style="width:32px;height:32px;flex-shrink:0;" aria-label="Settings">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- Canvas -->
  <div class="t-canvas-wrap" id="t-canvas-wrap">
    <canvas id="draw-canvas"></canvas>
    <input class="text-input-overlay" id="text-input" type="text" placeholder="Type here…" autocomplete="off" autocorrect="off" spellcheck="false" />
    <div class="t-connect-overlay" id="t-connect-overlay">
      <span class="spinner"></span>
      <div class="t-connect-title">Connecting…</div>
      <div class="t-connect-sub">Joining room <span id="overlay-room" style="color:var(--accent);font-family:var(--font-mono);"></span></div>
    </div>
  </div>

  <!-- Active draw bar -->
  <div class="t-active-bar" id="t-active-bar"></div>

  <!-- Page strip -->
  <div id="t-page-strip"></div>

  <!-- Toolbar -->
  <div class="t-toolbar">

    <!-- Row 1: tools -->
    <div class="t-tool-row">
      <button class="t-btn t-btn-sq active" id="tool-pen" aria-label="Pen">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
      <button class="t-btn t-btn-sq" id="tool-highlight" aria-label="Highlighter">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l-6 6v3h3l6-6"/><path d="M22 4l-2.5-1.5L15 7l2 4 5-7z"/></svg>
      </button>
      <button class="t-btn t-btn-sq" id="tool-text" aria-label="Text">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      </button>
      <button class="t-btn t-btn-sq" id="tool-eraser" aria-label="Eraser">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-2.5 2.5"/><path d="M6.5 17.5l5-5"/></svg>
      </button>

      <div style="width:1px;height:24px;background:var(--border);margin:0 2px;flex-shrink:0;"></div>

      <button class="t-btn t-btn-sq" id="t-undo" aria-label="Undo">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 7v6h6"/><path d="M3 13C5 8 9 5 14 5a9 9 0 0 1 0 18 9 9 0 0 1-8-4.9"/></svg>
      </button>
      <button class="t-btn t-btn-sq" id="t-redo" aria-label="Redo">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 7v6h-6"/><path d="M21 13C19 8 15 5 10 5a9 9 0 0 0 0 18 9 9 0 0 0 8-4.9"/></svg>
      </button>

      <div style="flex:1;"></div>

      <button class="t-btn t-btn-wide" id="t-clear-local" aria-label="Clear my strokes">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        Clear
      </button>
    </div>

    <!-- Row 2: colours -->
    <div class="t-color-row" id="t-color-row"></div>

    <!-- Row 3: size -->
    <div class="t-size-row">
      <svg width="10" height="10" viewBox="0 0 10 10" style="flex-shrink:0;"><circle cx="5" cy="5" r="2" fill="var(--text-muted)"/></svg>
      <input type="range" class="t-size-slider" id="size-slider" min="1" max="40" value="4" step="1" />
      <svg width="16" height="16" viewBox="0 0 16 16" style="flex-shrink:0;"><circle cx="8" cy="8" r="6" fill="var(--text-muted)"/></svg>
      <div class="brush-preview-wrap"><div id="brush-preview" style="width:4px;height:4px;"></div></div>
      <span class="t-size-label" id="size-val">4</span>
    </div>
  </div>
</div>

<!-- Settings drawer -->
<div class="settings-drawer" id="settings-drawer">
  <div class="settings-backdrop" id="settings-backdrop"></div>
  <div class="settings-sheet">
    <div class="settings-handle"></div>
    <div class="settings-title">Settings</div>

    <!-- Theme toggle -->
    <div class="settings-row">
      <span class="settings-label">Light mode</span>
      <label class="toggle">
        <input type="checkbox" id="theme-toggle" />
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
      </label>
    </div>

    <!-- Font size for text tool -->
    <div class="settings-row">
      <span class="settings-label">Text size</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" class="t-size-slider" id="font-size-slider" min="12" max="72" value="22" step="2" style="width:100px;" />
        <span class="t-size-label" id="font-size-val">22</span>
      </div>
    </div>

    <!-- Font family -->
    <div class="settings-row">
      <span class="settings-label">Text font</span>
      <select id="font-family-select" style="background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);padding:4px 8px;font-size:0.82rem;outline:none;">
        <option value="Inter, sans-serif">Inter</option>
        <option value="'Syne', sans-serif">Syne</option>
        <option value="'JetBrains Mono', monospace">Mono</option>
        <option value="Georgia, serif">Serif</option>
        <option value="cursive">Cursive</option>
      </select>
    </div>

    <!-- Room password -->
    <div class="settings-row" style="flex-direction:column;align-items:stretch;gap:8px;">
      <span class="settings-label">Set room password (optional)</span>
      <div style="display:flex;gap:8px;">
        <input class="input" id="pw-set-input" type="password" placeholder="Leave blank to clear" style="font-size:0.85rem;padding:0.5rem 0.75rem;" autocomplete="new-password" />
        <button class="btn btn-ghost" id="pw-set-btn" style="flex-shrink:0;font-size:0.8rem;padding:0.5rem 0.9rem;">Save</button>
      </div>
      <span style="font-size:0.72rem;color:var(--text-muted);">Canvas viewers will need this password to join.</span>
    </div>

    <button class="btn btn-ghost" id="settings-close" style="margin-top:0.25rem;">Close</button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="firebase-config.js"></script>
<script src="tablet.js"></script>
</body>
</html>
